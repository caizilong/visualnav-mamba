project_name: nomad                 
run_name: nomad_mamba               

# ---------------- 训练设置 ----------------
use_wandb: True                           # 是否启用 wandb
train: True
batch_size: 128
eval_batch_size: 128                       # 评估时使用较小的batch_size以避免OOM
epochs: 100
gpu_ids: [0]
num_workers: 12
lr: 5e-5
optimizer: adamw
clipping: False
max_norm: 1.
scheduler: "cosine"
warmup: True
warmup_epochs: 3
cyclic_period: 10
plateau_patience: 3
plateau_factor: 0.5
seed: 0

# ---------------- 模型参数 ----------------
model_type: nomad
vision_encoder: nomad_mamba               # 关键：使用新的 Mamba 版视觉编码器
encoding_size: 384                        # 对齐 ViT-S / DINOv3 的隐藏维度，避免额外压缩

# 视觉编码器配置（通过 timm 库支持多种 backbone）
# 支持的模型类型：
#   - EfficientNet: efficientnet-b0, efficientnet-b1, ...
#   - ResNet: resnet18, resnet50, ...
#   - ViT: vit_tiny_patch16_224, vit_small_patch16_224, ...
#   - DINOv2: vit_small_patch14_dinov2 (patch=14, 图像尺寸需能被14整除)
#   - DINOv3: vit_small_patch16_dinov3 (内部会映射到 timm 的官方权重名，patch=16，推荐)
#   - ConvNeXt: convnext_tiny, convnext_small, ...
obs_encoder: vit_small_patch16_dinov3     # 观测编码器（ViT-S / DINOv3）
goal_encoder: vit_small_patch16_dinov3    # 目标编码器类型；share_visual_backbone=true 时会实际共享主干
share_visual_backbone: true               # obs / goal 共用同一套 DINOv3 参数
adapter_hidden_dim: 96                    # 轻量 adapter 的瓶颈维度（约为 hidden size 的 1/4）
adapter_scale: 0.1                        # 小尺度残差注入，先保守利用预训练表示
freeze_backbone: true                     # 先冻结主干，只训练 adapter + 融合层 + Mamba + diffusion heads
backbone_trainable_blocks: 4              # 最终只微调 ViT 最后 4 个 block
backbone_mid_trainable_blocks: 2          # 中间阶段先只解冻最后 2 个 block
backbone_unfreeze_epochs: [5, 15]         # epoch <4 冻结全部，4~11 解冻 2 层，12+ 解冻 4 层
bidirectional_mamba: true               # 前向/反向 Mamba 同时建模，让 goal 信息反向传播到上下文
goal_fusion_hidden_dim: 768             # 目标门控融合 MLP 的隐藏维度（= 2 * encoding_size）
attn_unet: False
cond_predict_scale: False
mha_num_attention_heads: 4                # 这里用于控制 Mamba 层数/配置
mha_num_attention_layers: 4               # NoMaD_Mamba 中的 Mamba 层数
mha_ff_dim_factor: 4
down_dims: [64, 128, 256]

# Mamba2 超参数（可选，不设置则使用 MambaConfig 默认值；对 encoding_size=384 短序列建议较小值）
# 约束条件: (encoding_size * mamba_expand) % mamba_headdim == 0   #123
# 当前配置: (384 * 2) % 64 = 0 ✓   #123
mamba_d_state: 64
mamba_d_conv: 4
mamba_expand: 2
mamba_headdim: 64
mamba_chunk_size: 256
mamba_use_mem_eff_path: true

# ---------------- 扩散模型参数 ----------------
num_diffusion_iters: 10

# ---------------- 目标 mask 相关 ----------------
goal_mask_prob: 0.5

# ---------------- 动作空间归一化 ----------------
normalize: True

# ---------------- 推理时 guidance 调度 ----------------
goal_guidance_min: 0.25                  # 早期 denoising 更接近无条件分支，鼓励探索
goal_guidance_max: 1.75                  # 后期 denoising 强化目标条件，收敛到目标导航
goal_guidance_power: 1.5                 # 非线性调度，后段更快增强 goal guidance

# ---------------- 上下文设置 ----------------
context_type: temporal
context_size: 4                           # 提高到 8 帧历史，放大 Mamba2 的长程建模优势
alpha: 1e-4                               # 与原 NoMaD 相同：距离损失权重很小

# ---------------- 距离 / 动作 标签范围 ----------------
distance:
  min_dist_cat: 0
  max_dist_cat: 20
action:
  min_dist_cat: 3
  max_dist_cat: 20

# ---------------- 动作输出配置 ----------------
len_traj_pred: 8
learn_angle: False

# ---------------- 数据集设置 ----------------
image_size: [160, 160]                      # [宽, 高]，必须能被 patch_size 整除，96/16=6 ✓
datasets:
  # carla_dataset:
  #   data_folder: /workspace/datasets/carla_dataset
  #   train: vint_train/data/data_splits/carla_dataset/train/
  #   test: vint_train/data/data_splits/carla_dataset/test/
  #   end_slack: 1 # 允许预测轨迹终点与真实终点之间的最大容忍距离（单位：轨迹点索引）
  #   goals_per_obs: 2 # 对每一个观测帧（observation），从其未来轨迹中随机采样多少个目标（goal）图像
  #   negative_mining: True # 是否启用 ViNG 论文（Shah et al.）提出的负采样策略  
  # go_stanford:
  #   data_folder: /workspace/datasets/go_stanford
  #   train: vint_train/data/data_splits/go_stanford/train/
  #   test: vint_train/data/data_splits/go_stanford/test/
  #   end_slack: 0 # 允许预测轨迹终点与真实终点之间的最大容忍距离（单位：轨迹点索引）
  #   goals_per_obs: 2 # 对每一个观测帧（observation），从其未来轨迹中随机采样多少个目标（goal）图像
  #   negative_mining: True # 是否启用 ViNG 论文（Shah et al.）提出的负采样策略
  recon:
    data_folder: /workspace/datasets/recon
    train: vint_train/data/data_splits/recon/train/ # path to train folder with traj_names.txt
    test: vint_train/data/data_splits/recon/test/ # path to test folder with traj_names.txt
    end_slack: 3 # because many trajectories end in collisions
    goals_per_obs: 1 # how many goals are sampled per observation
    negative_mining: True # negative mining from the ViNG paper (Shah et al.)
