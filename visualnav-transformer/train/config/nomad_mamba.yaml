  #   negative_mining: True
  # 如有其它私有数据集，可按需仿照上面格式添加

# ---------------- 日志与评估配置 ----------------
# print_log_freq: 每隔多少个 batch 在终端打印一次（含详细 logger）
# wandb_log_freq: 每隔多少个 batch 上传标量到 wandb（越大越省流量/日志量；0=关闭 wandb 标量）
print_log_freq: 200
image_log_freq: 0                      # 关闭图像上传（最省流量）
num_images_log: 8
pairwise_test_freq: 0
eval_fraction: 0.25
wandb_log_freq: 200                    # 与 print 类似或更大，避免过于频繁
eval_freq: 1
