project_name: nomad                 
run_name: nomad_mamba               

# ---------------- 训练设置 ----------------
use_wandb: True                           # 是否启用 wandb
train: True
batch_size: 256
epochs: 100
gpu_ids: [0]
num_workers: 12
lr: 1e-4
optimizer: adamw
clipping: False
max_norm: 1.
scheduler: "cosine"
warmup: True
warmup_epochs: 4
cyclic_period: 10
plateau_patience: 3
plateau_factor: 0.5
seed: 0

# ---------------- 模型参数 ----------------
model_type: nomad
vision_encoder: nomad_mamba               # 关键：使用新的 Mamba 版视觉编码器
encoding_size: 256                        # 与 NoMaD_Mamba 输出维度保持一致

# 视觉编码器配置（通过 timm 库支持多种 backbone）
# 支持的模型类型：
#   - EfficientNet: efficientnet-b0, efficientnet-b1, ...
#   - ResNet: resnet18, resnet50, ...
#   - ViT: vit_tiny_patch16_224, vit_small_patch16_224, ...
#   - DINOv2: vit_small_patch14_dinov2 (patch=14, 图像尺寸需能被14整除)
#   - DINOv3: vit_small_patch16_dinov3 (patch=16, 推荐)
#   - ConvNeXt: convnext_tiny, convnext_small, ...
obs_encoder: vit_small_patch16_dinov3              # 观测编码器（DINOv3, patch=16）
goal_encoder: vit_small_patch16_dinov3           # 目标编码器（可选，默认与 obs_encoder 相同）
attn_unet: False
cond_predict_scale: False
mha_num_attention_heads: 4                # 这里用于控制 Mamba 层数/配置
mha_num_attention_layers: 4               # NoMaD_Mamba 中的 Mamba 层数
mha_ff_dim_factor: 4
down_dims: [64, 128, 256]

# Mamba2 超参数（可选，不设置则使用 MambaConfig 默认值；对 encoding_size=256 短序列建议较小值）
# 约束条件: (encoding_size * mamba_expand) % mamba_headdim == 0   #123
# 当前配置: (256 * 2) % 64 = 0 ✓   #123
mamba_d_state: 64
mamba_d_conv: 4
mamba_expand: 2
mamba_headdim: 64
mamba_chunk_size: 256
mamba_use_mem_eff_path: true

# ---------------- 扩散模型参数 ----------------
num_diffusion_iters: 10

# ---------------- 目标 mask 相关 ----------------
goal_mask_prob: 0.5

# ---------------- 动作空间归一化 ----------------
normalize: True

# ---------------- 上下文设置 ----------------
context_type: temporal
context_size: 0
alpha: 1e-4                               # 与原 NoMaD 相同：距离损失权重很小

# ---------------- 距离 / 动作 标签范围 ----------------
distance:
  min_dist_cat: 0
  max_dist_cat: 20
action:
  min_dist_cat: 3
  max_dist_cat: 20

# ---------------- 动作输出配置 ----------------
len_traj_pred: 8
learn_angle: False

# ---------------- 数据集设置 ----------------
image_size: [96, 96]                      # [宽, 高]，必须能被 patch_size 整除，96/16=6 ✓
datasets:
  go_stanford:
    data_folder: /workspace/datasets/go_stanford0
    train: vint_train/data/data_splits/go_stanford0/train/
    test: vint_train/data/data_splits/go_stanford0/test/
    end_slack: 0 # 允许预测轨迹终点与真实终点之间的最大容忍距离（单位：轨迹点索引）
    goals_per_obs: 2 # 对每一个观测帧（observation），从其未来轨迹中随机采样多少个目标（goal）图像
    negative_mining: True # 是否启用 ViNG 论文（Shah et al.）提出的负采样策略
  # recon:
