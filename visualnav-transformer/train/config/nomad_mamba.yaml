# ---------------- 日志与评估配置 ----------------
print_log_freq: 100
image_log_freq: 10000
num_images_log: 8
pairwise_test_freq: 0
eval_fraction: 0.25
wandb_log_freq: 50                     # 每 50 个 batch 上传一次，降低 wandb 同步频率
eval_freq: 1

