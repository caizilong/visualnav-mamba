project_name: nomad                    # NoMaD 项目名
run_name: nomad                        # 基础 run 名（训练时会拼接时间戳）

# ---------------- 训练设置 ----------------
use_wandb: True                        # 是否启用 wandb
train: True
batch_size: 128
epochs: 150
gpu_ids: [0]
num_workers: 12
lr: 5e-5                               # Diffusion 模型通常用更小学习率
optimizer: adamw
clipping: False
max_norm: 1.
scheduler: "cosine"
warmup: True 
warmup_epochs: 4
cyclic_period: 10
plateau_patience: 3
plateau_factor: 0.5
seed: 0

# ---------------- NoMaD 模型参数 ----------------
model_type: nomad
vision_encoder: nomad_vint            # 视觉编码器类型（在 deployment/utils.py 中使用）
encoding_size: 256                    # 视觉编码输出 embedding 维度
obs_encoder: efficientnet-b0          # 视觉 backbone 类型
attn_unet: False                      # 是否使用带注意力的 UNet（当前实现中未显式使用）
cond_predict_scale: False             # 条件扩散是否预测缩放（ConditionalUnet1D 的配置）
mha_num_attention_heads: 4
mha_num_attention_layers: 4
mha_ff_dim_factor: 4
down_dims: [64, 128, 256]             # ConditionalUnet1D 每层通道数

# ---------------- 扩散模型参数 ----------------
num_diffusion_iters: 10               # DDPM 时间步数（训练与推理中均使用）

# ---------------- 目标 mask 相关 ----------------
goal_mask_prob: 0.5                   # 训练时随机 mask 掉目标 token 的概率

# ---------------- 动作空间归一化 ----------------
normalize: True

# ---------------- 上下文设置 ----------------
context_type: temporal
context_size: 3                       # 使用 3 帧上下文（论文内实验有时使用 5）
alpha: 1e-4                           # 距离损失在总损失中的权重（非常小，主导为 diffusion loss）

# ---------------- 距离 / 动作 标签类别范围 ----------------
distance:
  min_dist_cat: 0
  max_dist_cat: 20
action:
  min_dist_cat: 3                     # 只在一定近距离范围内监督动作
  max_dist_cat: 20

# ---------------- 动作输出配置 ----------------
len_traj_pred: 8                      # NoMaD 预测 8 个 waypoint
learn_angle: False                    # 本版本只预测 (dx, dy)，不预测角度

# ---------------- 数据集设置 ----------------
image_size: [96, 96]                  # [宽, 高]，NoMaD 使用方形图像
datasets:
  go_stanford:
    data_folder: /workspace/datasets/go_stanford
    train: vint_train/data/data_splits/go_stanford/train/
    test: vint_train/data/data_splits/go_stanford/test/
    end_slack: 0 # 允许预测轨迹终点与真实终点之间的最大容忍距离（单位：轨迹点索引）
    goals_per_obs: 2 # 对每一个观测帧（observation），从其未来轨迹中随机采样多少个目标（goal）图像
    negative_mining: True # 是否启用 ViNG 论文（Shah et al.）提出的负采样策略
  recon:
    data_folder: /workspace/datasets/recon
    train: vint_train/data/data_splits/recon/train/ # path to train folder with traj_names.txt
    test: vint_train/data/data_splits/recon/test/ # path to test folder with traj_names.txt
    end_slack: 3 # because many trajectories end in collisions
    goals_per_obs: 1 # how many goals are sampled per observation
    negative_mining: True # negative mining from the ViNG paper (Shah et al.)
