image_log_freq: 0                      # 关闭图像上传（0 关闭，最省流量）
num_images_log: 8
pairwise_test_freq: 0
eval_fraction: 0.25
wandb_log_freq: 500                    # 每 500 个 batch 上传一次标量日志
eval_freq: 1