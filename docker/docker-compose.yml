version: "3.9"

services:
  cai:
    build:
      context: .
      dockerfile: Dockerfile.visualnav
    image: visualnav-mamba-env:latest
    container_name: visualnav-mamba

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    shm_size: "64g"

    volumes:
      - /dev/shm:/dev/shm
      - ~/visualnav-mamba:/workspace

    working_dir: /workspace

    tty: true
    stdin_open: true
    command: /bin/bash
